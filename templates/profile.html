{% block content %}
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/place.css') }}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Мой профиль</title>
</head>
<body class="bg-light">

<div class="registration-container">
    <div class="registration-card shadow">
        <a href="/" class="btn-back"> ← Назад</a>

        <div class="text-center mb-4">
            <div style="font-size: 60px; margin-bottom: 10px;">🙂</div>
            <h1 class="mb-0">Профиль пользователя</h1>
        </div>

        <div class="profile-details mt-4">
            <div class="mb-3 p-3 bg-light rounded shadow-sm">
                <label class="text-muted small">Имя</label>
                <div class="fw-bold text-dark">{{ current_user.name }}</div>
            </div>

            <div class="mb-4 p-3 bg-light rounded shadow-sm">
                <label class="text-muted small">Email</label>
                <div class="fw-bold text-dark">{{ current_user.email }}</div>
            </div>

            <div class="favorites-section mt-4 mb-4">
                <h6 class="text-muted mb-3"><i class="fas fa-heart text-danger me-2"></i>Избранные места:</h6>
                <div class="list-group shadow-sm">
                    {% for place in favorite_places %}
                    <div class="list-group-item d-flex justify-content-between align-items-center border-0 mb-1 rounded bg-white">
                        <div>
                            <div class="fw-bold" style="font-size: 14px;">{{ place.title }}</div>
                        </div>
                        <a href="/place?id={{ place.id }}" class="btn btn-sm btn-outline-primary"
                           style="font-size: 12px; border-radius: 20px;">Открыть</a>
                    </div>
                    {% else %}
                    <p class="text-muted small ps-2">Список пуст</p>
                    {% endfor %}
                </div>
            </div>

            <div class="actions border-top pt-4 text-center">
                <a href="{{ url_for('logout') }}" class="btn_logout"
                   style="color: #ff4d4d; text-decoration: none; font-weight: 500;">
                    Выйти из аккаунта
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{% endblock %}
