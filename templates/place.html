{% block content %}
<h1>Места куда можно сходить</h1>
{% for item in places%}
<div class="col-md6 border rounded">
    <h2>{{item.title}}</h2>
    <div>
        {{item.description}}
    </div>
    <div>
        Категория места: {{item.category}}
    </div>
    <div>
        Часы работы: {{item.opening_hours}}
    </div>
    <div>
        Адрес места: {{item.address}}
    </div>
</div>
{% endfor %}
{% endblock %}
